image: Visual Studio 2022

branches:
  only:
    - /^v.*/

install:
  - npm install -g bun
  - bun install

build_script:
  # 1. Install web frontend dependencies and build the frontend asset bundle first
  - cmd: cd desktop-app\web && bun install && bun run build
  # 2. Go back to desktop-app root, install its deps, and run the electrobun build
  - cmd: cd .. && bun install && bunx electrobun build --env=stable

artifacts:
  # Electrobun explicitly logs "creating artifacts folder... moving artifacts..."
  # It moves the final zip to the root-level 'artifacts' folder.
  - path: 'artifacts\*.zip'
    name: windows-release

deploy:
  provider: GitHub
  auth_token:
    secure: En2ShShIjO9uMCDnGLU005CVlzpSzctpSeXIPHdsSCaNIQ5LjARsIU+Z8p0tyNiK
  artifact: windows-release
  draft: false
  prerelease: false
  on:
    appveyor_repo_tag: true

test: "off"
